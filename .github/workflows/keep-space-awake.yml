name: Keep Hugging Face Space Awake

on:
  schedule:
    - cron: "0 */24 * * *"  # Every 24 hours
  workflow_dispatch:         # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Space
        run: curl -s -o /dev/null -w "%{http_code}" https://huggingface.co/spaces/rippfball56/ai_career_assistant_chatbot
